services:
  whoami-app:
    image: traefik/whoami
    container_name: whoami-app
    restart: unless-stopped
    networks:
      - frontend
    labels:
      - traefik.enable=true
      - traefik.docker.network=frontend
      - traefik.http.services.whoami-app.loadbalancer.server.port=80

      # Router A — wildcard *.DOMAIN + apex DOMAIN (OVH DNS-01)
      - traefik.http.routers.app-ovh.entrypoints=websecure
      - traefik.http.routers.app-ovh.tls=true
      - traefik.http.routers.app-ovh.tls.certresolver=le-ovh
      - traefik.http.routers.app-ovh.tls.domains[0].main=${DOMAIN}
      - traefik.http.routers.app-ovh.tls.domains[0].sans=*.${DOMAIN}
      - traefik.http.routers.app-ovh.rule=Host(`${DOMAIN}`) || HostRegexp(`${DOMAIN_REGEX}`)
      - traefik.http.routers.app-ovh.middlewares=crowdsec@file

      # Router B — wildcard *.DOMAIN_GANDI + apex DOMAIN_GANDI (Gandi DNS-01)
      - traefik.http.routers.app-gandi.entrypoints=websecure
      - traefik.http.routers.app-gandi.tls=true
      - traefik.http.routers.app-gandi.tls.certresolver=le-gandi
      - traefik.http.routers.app-gandi.tls.domains[0].main=${DOMAIN_GANDI}
      - traefik.http.routers.app-gandi.tls.domains[0].sans=*.${DOMAIN_GANDI}
      - traefik.http.routers.app-gandi.rule=Host(`${DOMAIN_GANDI}`) || HostRegexp(`${DOMAIN_GANDI_REGEX}`)
      - traefik.http.routers.app-gandi.middlewares=crowdsec@file

      # Router C — hôte simple (TLS challenge, pas de wildcard)
      - traefik.http.routers.app-simple.entrypoints=websecure
      - traefik.http.routers.app-simple.tls=true
      - traefik.http.routers.app-simple.tls.certresolver=le-alpn
      - traefik.http.routers.app-simple.rule=Host(`${DOMAIN_SIMPLE}`)
      - traefik.http.routers.app-simple.middlewares=crowdsec@file

networks:
  frontend:
    external: true
